# Visual Change Detection (Grating) Task Configuration
# Detect changes in grating stimulus
# Reference: Chen et al., Science Advances 2022

# Task identifier
name: vcd_grating

# Number of output classes (binary: change/no-change)
n_classes: 2

# Task description
description: "Visual change detection (grating stimulus)"

# L5 Readout configuration (biologically realistic)
# Uses single L5 pool with threshold judgment: r > r₀ = 0.01
readout:
  # Use L5 pyramidal cell readout (true) or linear readout (false)
  use_l5_readout: false

  # Readout strategy: 'threshold' for binary change detection
  strategy: threshold

  # Pool index for threshold readout (pool 1 for vcd_grating)
  pool_index: 1

  # Threshold value r₀
  threshold: 0.01

  # Number of L5 readout populations to load
  n_readout_populations: 15

  # Number of L5 neurons per pool
  neurons_per_class: 16
